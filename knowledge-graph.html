<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCM Living Curriculum Topology</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root {
  --bg: #080e1a; --surface: #0d1525; --surface2: #111d33;
  --border: #1a2d4a; --text: #c8d6e5; --dim: #4a6a8a;
  --accent: #00b4d8; --accent2: #0077b6;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'SF Mono','Fira Code',monospace; background:var(--bg); color:var(--text); overflow:hidden; height:100vh; }

/* Layout */
#app { display:grid; grid-template-columns:1fr 380px; grid-template-rows:auto 1fr; height:100vh; }
#toolbar { grid-column:1/-1; background:var(--surface); border-bottom:1px solid var(--border); padding:0.5rem 1rem; display:flex; align-items:center; gap:1rem; flex-wrap:wrap; z-index:10; }
#graph-container { position:relative; overflow:hidden; }
#panel { background:var(--surface); border-left:1px solid var(--border); overflow-y:auto; transition:transform 0.3s; }
#panel.collapsed { transform:translateX(100%); }
#panel-toggle { position:absolute; right:380px; top:50%; transform:translateY(-50%); z-index:5; background:var(--surface2); border:1px solid var(--border); color:var(--dim); padding:0.3rem; cursor:pointer; border-radius:4px 0 0 4px; font-size:0.7rem; writing-mode:vertical-rl; }
#panel.collapsed ~ #panel-toggle { right:0; }

/* Toolbar */
.toolbar-title { font-weight:700; font-size:1rem; letter-spacing:-0.02em; white-space:nowrap; }
.toolbar-sep { width:1px; height:20px; background:var(--border); }
.filter-group { display:flex; align-items:center; gap:0.4rem; }
.filter-group label { font-size:0.65rem; text-transform:uppercase; letter-spacing:0.06em; color:var(--dim); }
select, button { font-family:inherit; font-size:0.75rem; background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:4px; padding:0.25rem 0.5rem; cursor:pointer; }
select:focus, button:focus { outline:1px solid var(--accent); }
button:hover { background:var(--border); }
button.active { background:var(--accent2); border-color:var(--accent); color:#fff; }
.kpi-badge { font-size:0.7rem; color:var(--accent); font-weight:600; }

/* Graph */
svg { width:100%; height:100%; }
.link { stroke-opacity:0.35; fill:none; }
.link:hover { stroke-opacity:0.8; }
.node circle { stroke-width:1.5; cursor:pointer; transition:r 0.2s; }
.node text { font-size:8px; fill:var(--dim); pointer-events:none; }
.node.selected circle { stroke:#fff !important; stroke-width:3; }
.node.dimmed circle { opacity:0.15; }
.node.dimmed text { opacity:0.08; }
.link.dimmed { stroke-opacity:0.04; }
.link.highlighted { stroke-opacity:0.9; stroke-width:2.5; }
.cascade-pulse { fill:none; stroke:var(--accent); stroke-width:3; opacity:0; }

/* Panel */
.panel-header { padding:1rem; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--surface); z-index:2; }
.panel-header h2 { font-size:0.95rem; font-weight:700; margin-bottom:0.3rem; line-height:1.3; }
.panel-header .meta { font-size:0.7rem; color:var(--dim); display:flex; gap:0.8rem; }
.panel-header .meta span { display:flex; align-items:center; gap:0.25rem; }
.section-badge { display:inline-block; width:10px; height:10px; border-radius:2px; }
.panel-body { padding:0 1rem 1rem; }
.level-ring { margin-top:0.8rem; border:1px solid var(--border); border-radius:6px; overflow:hidden; }
.level-ring-header { padding:0.5rem 0.7rem; background:var(--surface2); cursor:pointer; display:flex; justify-content:space-between; align-items:center; user-select:none; }
.level-ring-header .lbl { font-size:0.75rem; font-weight:600; }
.level-ring-header .cnt { font-size:0.65rem; color:var(--dim); }
.level-ring-body { padding:0.5rem 0.7rem; font-size:0.75rem; line-height:1.55; color:var(--dim); display:none; border-top:1px solid var(--border); }
.level-ring-body.open { display:block; }
.level-ring-body .qa { margin-bottom:0.6rem; padding-bottom:0.6rem; border-bottom:1px solid var(--border); }
.level-ring-body .qa:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
.level-ring-body .q-label { font-size:0.65rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--accent); margin-bottom:0.2rem; }
.level-ring-body .answer { color:var(--text); font-weight:500; }
.connections-section { margin-top:1rem; }
.connections-section h3 { font-size:0.75rem; font-weight:600; margin-bottom:0.5rem; }
.conn-item { font-size:0.72rem; padding:0.35rem 0; border-bottom:1px solid var(--border); cursor:pointer; }
.conn-item:hover { color:var(--accent); }
.conn-type { font-size:0.6rem; text-transform:uppercase; padding:0.1rem 0.35rem; border-radius:2px; margin-right:0.3rem; font-weight:600; }
.type-includes { background:#0077b622; color:#00b4d8; }
.type-related_to { background:#22c55e22; color:#22c55e; }
.type-applies_to { background:#a855f722; color:#a855f7; }
.type-part_of { background:#f59e0b22; color:#f59e0b; }
.type-prerequisite_for { background:#ef444422; color:#ef4444; }
.type-contrasts_with { background:#ec489922; color:#ec4899; }

/* Tradeoff overlay */
.tradeoff-card { margin-top:0.8rem; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:0.7rem; }
.tradeoff-card .scenario { font-size:0.72rem; color:var(--dim); line-height:1.5; margin-bottom:0.5rem; }
.tradeoff-card .objectives { display:flex; gap:0.5rem; margin-bottom:0.5rem; }
.tradeoff-card .obj { flex:1; font-size:0.68rem; padding:0.3rem 0.5rem; border-radius:4px; text-align:center; }
.obj-a { background:#ef444422; color:#ef4444; border:1px solid #ef444444; }
.obj-b { background:#3b82f622; color:#3b82f6; border:1px solid #3b82f644; }
.tradeoff-card .strategy { font-size:0.72rem; color:#22c55e; margin-bottom:0.3rem; }
.tradeoff-card .sacrifice { font-size:0.72rem; color:#f59e0b; }
.strat-label { font-size:0.6rem; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.15rem; font-weight:600; }

/* Cascade mode */
.cascade-indicator { position:absolute; top:0.5rem; left:0.5rem; background:#ef4444dd; color:#fff; padding:0.3rem 0.7rem; border-radius:4px; font-size:0.72rem; font-weight:600; z-index:5; display:none; }

/* Legend */
#legend { position:absolute; bottom:0.8rem; left:0.8rem; background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:0.6rem 0.8rem; font-size:0.65rem; z-index:5; }
#legend h4 { font-size:0.6rem; text-transform:uppercase; letter-spacing:0.06em; color:var(--dim); margin-bottom:0.4rem; }
.legend-row { display:flex; align-items:center; gap:0.4rem; margin:0.2rem 0; }
.legend-swatch { width:10px; height:10px; border-radius:2px; }
.legend-line { width:18px; height:0; border-top:2px solid; }

/* Drill-down overlay */
#drilldown { position:absolute; inset:0; background:rgba(8,14,26,0.92); z-index:20; display:none; }
#drilldown.active { display:flex; align-items:center; justify-content:center; }
#drilldown-close { position:absolute; top:1rem; right:1rem; font-size:1.2rem; color:var(--dim); cursor:pointer; z-index:21; }
#drilldown-close:hover { color:#fff; }
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <span class="toolbar-title">SCM Curriculum Topology</span>
    <span class="toolbar-sep"></span>
    <div class="filter-group">
      <label>Section</label>
      <select id="filterSection"><option value="all">All (A-K)</option></select>
    </div>
    <div class="filter-group">
      <label>Edge Type</label>
      <select id="filterEdge">
        <option value="all">All</option>
        <option value="related_to">Related To</option>
        <option value="includes">Includes</option>
        <option value="part_of">Part Of</option>
        <option value="applies_to">Applies To</option>
        <option value="prerequisite_for">Prerequisite</option>
        <option value="contrasts_with">Contrasts</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Bloom</label>
      <select id="filterBloom">
        <option value="all">All</option>
        <option value="remember">Remember</option>
        <option value="understand">Understand</option>
        <option value="apply">Apply</option>
        <option value="analyze">Analyze</option>
      </select>
    </div>
    <button id="btnCascade">Cascade Mode</button>
    <button id="btnTradeoffs">Show Tradeoffs</button>
    <button id="btnReset">Reset View</button>
    <span class="toolbar-sep"></span>
    <span class="kpi-badge" id="kpiNodes">102 nodes</span>
    <span class="kpi-badge" id="kpiEdges">325 edges</span>
  </div>
  <div id="graph-container">
    <svg id="graph"></svg>
    <div class="cascade-indicator" id="cascadeIndicator">CASCADE MODE — click a node to trigger disruption</div>
    <div id="legend">
      <h4>Sections</h4>
      <div id="legendSections"></div>
      <h4 style="margin-top:0.5rem">Edge Types</h4>
      <div id="legendEdges"></div>
    </div>
    <div id="drilldown">
      <span id="drilldown-close">&times; ESC</span>
      <svg id="radial"></svg>
    </div>
  </div>
  <button id="panel-toggle" onclick="togglePanel()">DETAIL</button>
  <div id="panel">
    <div class="panel-header">
      <h2 id="panelTitle">Select a concept</h2>
      <div class="meta" id="panelMeta"></div>
    </div>
    <div class="panel-body" id="panelBody">
      <p style="font-size:0.75rem;color:var(--dim);margin-top:1rem;">Click any node in the graph to inspect its questions, answers, and connections across all 9 levels.</p>
    </div>
  </div>
</div>

:1},{"source":"G.9","target":"J.2","type":"related_to","value":1},{"source":"G.9","target":"K.6","type":"related_to","value":1},{"source":"G.9","target":"K.15","type":"related_to","value":1},{"source":"G.10","target":"I.2","type":"related_to","value":1},{"source":"G.10","target":"I.4","type":"related_to","value":1},{"source":"H.1","target":"I.4","type":"related_to","value":1},{"source":"I.1","target":"J.2","type":"related_to","value":1},{"source":"I.5","target":"K.8","type":"related_to","value":1},{"source":"I.5","target":"K.9","type":"related_to","value":1},{"source":"I.5","target":"K.11","type":"related_to","value":1},{"source":"I.5","target":"K.12","type":"related_to","value":1},{"source":"J.1","target":"K.6","type":"related_to","value":1},{"source":"J.1","target":"K.15","type":"related_to","value":1},{"source":"J.4","target":"K.13","type":"related_to","value":1}],"concepts":{"A.1":{"t":"Define supply chain management","d":"Supply chain management (SCM) encompasses the planning and management of all activities involved in sourcing, procurement, conversion, and logistics management, including coordination and collaboration with channel partners such as suppliers, intermediaries, third-party service providers, and customers.","b":"remember","df":"easy"},"A.2":{"t":"Define the entire supply chain","d":"The entire supply chain is the end-to-end network of organizations, people, activities, information, and resources involved in the flow and transformation of goods from raw materials through production, warehousing, and distribution to the final end consumer.","b":"remember","df":"easy"},"A.3":{"t":"Define logistics","d":"Logistics is the process of planning, implementing, and controlling the efficient, effective forward and reverse flow and storage of goods, services, and related information between the point of origin and the point of consumption to meet customer requirements.","b":"remember","df":"easy"},"A.4":{"t":"Explain how logistics impacts supply chain management","d":"Logistics impacts supply chain management by enabling the efficient movement and storage of goods, directly affecting cost reduction, customer satisfaction, operational efficiency, and competitive advantage throughout the supply chain.","b":"understand","df":"medium"},"A.5":{"t":"Describe how E-commerce, logistics, import taxes, risk, tariffs, customs, and other legal aspects impact global trading","d":"E-commerce, logistics, import taxes, tariffs, customs regulations, risk factors, and other legal aspects collectively shape global trading by influencing costs, compliance requirements, delivery speed, market access, and supply chain complexity for businesses operating across international borders.","b":"understand","df":"medium"},"A.6":{"t":"Analyze the creation of new value in the supply chain for customers, society, and the environment","d":"Value creation in the supply chain refers to the process of generating benefits for customers through product quality and service, for society through economic development and ethical practices, and for the environment through sustainable operations that minimize negative ecological impacts.","b":"analyze","df":"hard"},"A.7":{"t":"Explain how supply chain management is practiced in a wide array of industries","d":"Supply chain management is practiced across diverse industries including healthcare, retail, manufacturing, automotive, food and beverage, and technology, with each industry adapting SCM principles to its unique requirements for sourcing, production, distribution, and customer service.","b":"understand","df":"medium"},"A.8":{"t":"Explain demand forecasting","d":"Demand forecasting is a business practice that uses historical sales data, statistical models, market trends, and other factors to estimate the expected customer demand for a product or service over a specific future period, enabling better supply chain planning and decision-making.","b":"understand","df":"medium"},"A.9":{"t":"Define logistics management","d":"Logistics management is that part of supply chain management that plans, implements, and controls the efficient, effective forward and reverse flow and storage of goods, services, and related information between the point of origin and the point of consumption in order to meet customers' requirements.","b":"remember","df":"easy"},"A.10":{"t":"Define physical and information flows","d":"Physical flow (material flow) is the movement and storage of tangible goods from suppliers through production to the end customer, while information flow is the bidirectional exchange of data such as demand forecasts, inventory levels, order status, and production schedules among supply chain partners.","b":"remember","df":"easy"},"A.11":{"t":"Define strategic orientation for saving money within an organization","d":"Strategic orientation for saving money within an organization refers to the deliberate, systematic approach of identifying and eliminating excess costs across the supply chain through process optimization, automation, demand forecasting, supplier management, and inventory control to improve profitability and competitive positioning.","b":"remember","df":"easy"},"A.12":{"t":"Describe the global impact on supply chain management","d":"The global impact on supply chain management refers to how globalization, international trade, geopolitical factors, cultural differences, and technological advances create both opportunities and challenges for managing supply chains that span multiple countries, regulations, and markets.","b":"understand","df":"medium"},"A.13":{"t":"Explain the importance of understanding importing, exporting, trade agreements, and customs regulations for supply chain management","d":"Understanding importing, exporting, trade agreements, and customs regulations is essential for supply chain management because these elements govern the legal, financial, and operational requirements for moving goods across international borders, directly affecting costs, compliance, lead times, and market access.","b":"understand","df":"medium"},"A.14":{"t":"Explain the reasons for growth of supply chain management (information revolution, increased competition in globalized markets, relationship management)","d":"The growth of supply chain management has been driven by three major forces: the information technology revolution enabling integrated management and real-time data sharing, increased competition in globalized markets requiring cost efficiency and agility, and the shift toward relationship management emphasizing collaboration with suppliers and partners.","b":"understand","df":"medium"},"B.1":{"t":"Define analytics","d":"Analytics is the systematic use of data collection, processing, and statistical analysis techniques to extract meaningful insights and support better decision-making across business operations.","b":"remember","df":"easy"},"B.2":{"t":"Explain customer relationship management","d":"Customer relationship management (CRM) is a strategic process that organizations use to manage, analyze, and improve their interactions with customers through dedicated information systems that store and analyze customer data, supporting sales, marketing, and service activities.","b":"understand","df":"medium"},"B.3":{"t":"Describe the role of forecasting","d":"Forecasting is the process of using historical data, statistical models, market trends, and other factors to estimate future customer demand for products or services over a specific time period.","b":"understand","df":"medium"},"B.4":{"t":"Explain the growth of global distribution","d":"Global distribution refers to the international networks and processes through which goods are moved, stored, and delivered across national borders to reach customers worldwide.","b":"understand","df":"medium"},"B.5":{"t":"Explain supply chain management for healthcare industry","d":"Healthcare supply chain management is the coordination of sourcing, procurement, production, and distribution of medical supplies, pharmaceuticals, and equipment to ensure that healthcare providers have the right products available to deliver patient care.","b":"understand","df":"medium"},"B.6":{"t":"Explain the logistics of inventory management","d":"Inventory management is the branch of business management concerned with planning, controlling, and tracking stock as it moves in and out of warehouses to ensure the right amount of product is available at any given time.","b":"understand","df":"medium"},"B.7":{"t":"Define procurement","d":"Procurement is the process of sourcing, negotiating, and acquiring the raw materials, components, goods, and services that an organization needs to operate and fulfill customer demand.","b":"remember","df":"easy"},"B.8":{"t":"Describe sales and operations planning","d":"Sales and operations planning (S&OP) is a cross-functional business process that aligns demand forecasts with supply capabilities to balance sales plans, production plans, and financial objectives over a medium-term planning horizon.","b":"understand","df":"medium"},"B.9":{"t":"Define supply market intelligence","d":"Supply market intelligence is the systematic process of gathering, analyzing, and interpreting data about supplier markets, pricing trends, and competitive dynamics to support informed procurement decisions and strategic sourcing.","b":"remember","df":"easy"},"B.10":{"t":"Define sustainability for supply chain management","d":"Supply chain sustainability is the practice of integrating environmental, social, and economic considerations into the sourcing, production, and distribution of goods throughout the entire supply chain lifecycle.","b":"remember","df":"easy"},"B.11":{"t":"Explain the relationship between supply chain management and transportation planning","d":"Transportation planning is the process of optimizing the movement of goods between locations within a supply chain, encompassing carrier selection, route optimization, mode selection, and shipment consolidation to minimize costs while meeting delivery requirements.","b":"understand","df":"medium"},"B.12":{"t":"Describe careers associated with supply chain management","d":"Supply chain management careers encompass a broad range of professional roles involved in purchasing, inventory control, manufacturing, logistics, transportation, and strategic planning across organizations of all types and sizes.","b":"understand","df":"medium"},"C.1":{"t":"Describe leadership opportunities for supply chain management.","d":"Leadership opportunities in supply chain management encompass a range of strategic and operational roles—from procurement directors and logistics managers to chief supply chain officers—where professionals guide teams, drive organizational strategy, and influence end-to-end supply chain performance.","b":"understand","df":"medium"},"C.2":{"t":"Describe effective communication skills for supply chain managers.","d":"Effective communication skills for supply chain managers include the ability to clearly convey information, coordinate across internal departments and external partners, and facilitate collaboration among suppliers, carriers, and customers to ensure seamless supply chain operations.","b":"understand","df":"medium"},"C.3":{"t":"Explain responsibility ethics for supply chain management.","d":"Responsibility ethics in supply chain management refers to the moral obligation of organizations and professionals to ensure that supply chain activities are conducted in a socially responsible, environmentally sustainable, and legally compliant manner throughout all tiers of the supply chain.","b":"understand","df":"medium"},"C.4":{"t":"Describe language skills possessed by successful chain managers.","d":"Language skills for successful supply chain managers include proficiency in multiple languages and fluency in industry-specific terminology, enabling effective communication with global suppliers, partners, and customers across diverse cultural and linguistic contexts.","b":"understand","df":"medium"},"C.5":{"t":"Explain the importance of flexible thinking in supply chain management.","d":"Flexible thinking in supply chain management is the ability to adapt strategies, processes, and decision-making approaches in response to changing market conditions, disruptions, and evolving customer demands, enabling supply chains to remain resilient and competitive.","b":"understand","df":"medium"},"C.6":{"t":"Understand freight terminology.","d":"Freight terminology encompasses the specialized vocabulary and acronyms used in the transportation and logistics industry to describe shipping modes, documentation, pricing, equipment, and regulatory requirements involved in moving goods through the supply chain.","b":"understand","df":"medium"},"C.7":{"t":"Explain the importance of people and problem-solving skills among successful supply chain managers.","d":"People and problem-solving skills are interpersonal and analytical competencies that enable supply chain managers to build strong relationships with stakeholders, lead diverse teams, negotiate effectively, and identify root causes of operational challenges to develop creative and timely solutions.","b":"understand","df":"medium"},"C.8":{"t":"Explain the importance of technology skills among supply chain managers.","d":"Technology skills for supply chain managers encompass proficiency in digital tools, enterprise systems, and data analytics platforms—such as ERP, WMS, TMS, and business intelligence software—that enable efficient planning, execution, and optimization of supply chain operations.","b":"understand","df":"medium"},"C.9":{"t":"Explain the sense of urgency associated with supply chain management.","d":"The sense of urgency in supply chain management refers to the critical need for timely decision-making, rapid response to disruptions, and proactive planning to meet strict delivery deadlines, maintain customer satisfaction, and minimize costly delays throughout the supply chain.","b":"understand","df":"medium"},"C.10":{"t":"Describe the importance of Excel knowledge for supply chain management.","d":"Excel knowledge in supply chain management refers to proficiency in using Microsoft Excel's data analysis, visualization, and modeling capabilities to manage inventory, forecast demand, track shipments, analyze costs, and support data-driven decision-making across supply chain operations.","b":"understand","df":"medium"},"C.11":{"t":"Describe the temperament required for successful supply chain management.","d":"The temperament required for successful supply chain management is a combination of personality traits—including conscientiousness, adaptability, decisiveness, patience, and resilience—that enable professionals to manage complexity, handle pressure, and maintain composure while navigating the dynamic and often unpredictable nature of global supply chains.","b":"understand","df":"medium"},"D.1":{"t":"Explain the relationship between purchasing and supply chain management.","d":"Purchasing (procurement) is a critical subset of supply chain management responsible for sourcing, negotiating, and acquiring the materials, goods, and services a business needs, while SCM encompasses the broader coordination of all activities from suppliers to end customers.","b":"understand","df":"medium"},"D.2":{"t":"Explain how a company will provide value to supply chain management.","d":"A company provides value in supply chain management by creating utility for customers through optimized processes that deliver the right products, at the right time, at competitive cost, while generating shareholder value and competitive advantage.","b":"understand","df":"medium"},"D.3":{"t":"Explain how suppliers, subcontractors, transportation providers, and product distribution is determined by a company.","d":"Companies determine their suppliers, subcontractors, transportation providers, and distribution channels through strategic evaluation processes that assess cost, capability, reliability, and alignment with overall supply chain objectives.","b":"understand","df":"medium"},"D.4":{"t":"Define supply chain integration.","d":"Supply chain integration is the synchronization and coordination of processes, information flow, and activities across all organizations in a supply chain to create a seamless, efficient, and transparent system that reduces cost and improves customer service.","b":"remember","df":"easy"},"D.5":{"t":"Describe management of supply and demand for supply chain management.","d":"Supply and demand management in SCM is the coordinated process of forecasting customer demand and aligning supply-side activities including sourcing, production, and inventory to meet that demand efficiently while minimizing waste and cost.","b":"understand","df":"medium"},"D.6":{"t":"Describe the efficient facility network design for supply chain management.","d":"Facility network design is a systematic approach to determining the optimal number, location, and size of manufacturing, warehousing, and distribution facilities, along with transportation routes, to ensure efficient product flow at minimum cost while meeting customer service requirements.","b":"understand","df":"medium"},"D.7":{"t":"Explain the importance of expense management for supply chain management.","d":"Expense management in supply chain management is the systematic process of monitoring, controlling, and optimizing all costs associated with sourcing, producing, storing, and delivering goods, ensuring profitability and competitive positioning without sacrificing service quality.","b":"understand","df":"medium"},"E.1":{"t":"Describe the role of manufacturing in a supply chain context.","d":"Manufacturing in a supply chain context refers to the conversion, production, or assembly of raw materials and components into finished goods, representing the 'make' process within the supply chain framework.","b":"understand","df":"medium"},"E.2":{"t":"Define inventory management's important relationship with supply chain management.","d":"Inventory management is the process of ordering, storing, tracking, and controlling a company's goods and supplies, serving as a foundational component of supply chain management that balances product availability with cost efficiency.","b":"remember","df":"easy"},"E.3":{"t":"Explain transportation management in a supply chain.","d":"Transportation management is the planning, execution, and optimization of the physical movement of goods inbound and outbound across the supply chain, ensuring products are delivered efficiently, on time, and at minimal cost.","b":"understand","df":"medium"},"E.4":{"t":"Explain the role and cost of warehouses in supply chain management.","d":"Warehouses are strategic facilities that store, protect, and manage inventory between production and distribution, serving as critical links in the supply chain while incurring costs related to space, labor, equipment, and operations.","b":"understand","df":"medium"},"E.5":{"t":"Explain the process for product returns.","d":"Product returns, managed through reverse logistics, is the process of moving goods from the customer back to the seller or manufacturer for the purpose of recapturing value through resale, refurbishment, recycling, or proper disposal.","b":"understand","df":"medium"},"E.6":{"t":"Describe the importance of customer service in a supply chain.","d":"Customer service in a supply chain is the set of activities and processes designed to ensure customer satisfaction through reliable order fulfillment, timely delivery, and responsive support, serving as a key driver of customer retention and competitive advantage.","b":"understand","df":"medium"},"F.1":{"t":"Determine what products to sell","d":"The strategic process of evaluating market demand, customer needs, competitive landscape, and organizational capabilities to decide which products a company should offer for sale.","b":"apply","df":"medium"},"F.2":{"t":"How a company determines what products are used and sold by a business","d":"The analytical process by which a company evaluates its current product offerings, customer buying behavior, and market conditions to understand which products are actively consumed, resold, or distributed within its operations.","b":"understand","df":"medium"},"F.3":{"t":"Product portfolio","d":"A product portfolio is the complete collection of all products and services offered by a company, analyzed collectively to assess performance, profitability, and strategic alignment.","b":"remember","df":"easy"},"F.4":{"t":"The Pareto principle","d":"The Pareto principle, also known as the 80/20 rule, states that roughly 80% of outcomes or effects result from approximately 20% of causes or inputs.","b":"understand","df":"medium"},"F.5":{"t":"Slow-moving products headed toward obsolescence","d":"Slow-moving products are inventory items with low turnover rates that are declining in demand and progressing toward obsolescence, where they will have little or no market value and are unlikely to be sold in the future.","b":"remember","df":"easy"},"F.6":{"t":"Importance of minimizing inventory during all stages of supply chain management","d":"Minimizing inventory across all stages of the supply chain is a strategic objective focused on reducing excess stock at every point from raw materials through finished goods, in order to lower costs, reduce waste, and improve operational efficiency.","b":"understand","df":"medium"},"G.1":{"t":"Explain the importance of synchronizing material flow","d":"Synchronizing material flow is the coordination and alignment of the movement of raw materials, work-in-progress, and finished goods across all stages of the supply chain to ensure seamless, timely delivery and minimal waste.","b":"understand","df":"medium"},"G.2":{"t":"Define inventory maximization","d":"Inventory maximization is the strategic process of optimizing inventory levels across the supply chain to maximize service levels, capital efficiency, and profitability while minimizing holding costs and stockout risks.","b":"remember","df":"easy"},"G.3":{"t":"Define decoupling points for inventory maximization","d":"A decoupling point is a strategic location in the supply chain where inventory is held to separate forecast-driven (push) processes from customer-order-driven (pull) processes, enabling independent planning and execution on either side.","b":"remember","df":"easy"},"G.4":{"t":"Explain how algorithms are used to maximize capital costs associated with supply chain management","d":"Supply chain algorithms are mathematical and computational models used to optimize capital allocation across inventory, transportation, and infrastructure by determining the most cost-effective ordering quantities, reorder points, and distribution strategies.","b":"understand","df":"medium"},"G.5":{"t":"Explain how proximity to the customer relates to supply chain efficiency","d":"Proximity to the customer refers to the strategic placement of inventory, warehouses, and distribution centers closer to end consumers to reduce delivery times, lower last-mile logistics costs, and improve overall supply chain responsiveness.","b":"understand","df":"medium"},"G.6":{"t":"Describe how product sourcing decisions are made","d":"Product sourcing decisions are strategic make-or-buy analyses that evaluate whether to produce goods internally or procure them from external suppliers based on cost, quality, capacity, risk, and alignment with core competencies.","b":"understand","df":"medium"},"G.7":{"t":"Describe evaluation processes for supply chain management","d":"Supply chain evaluation processes are systematic methods for assessing performance, identifying improvement opportunities, and benchmarking operations using standardized frameworks such as the SCOR model and key performance indicators (KPIs).","b":"understand","df":"medium"},"G.8":{"t":"Define how supply chain management meets consumer needs","d":"Supply chain management meets consumer needs by coordinating all activities across sourcing, production, and distribution to deliver the right product, at the right place, at the right time, in the right condition, and at the right cost.","b":"remember","df":"easy"},"G.9":{"t":"Explain how market signal and consumer demand impact supply chain management","d":"Market signals and consumer demand are real-time and near-real-time data inputs, including point-of-sale data, search trends, promotional activity, and external factors, that drive supply chain planning, inventory positioning, and fulfillment decisions.","b":"understand","df":"medium"},"G.10":{"t":"Explain how to meet and improve customer needs for supply chain management","d":"Meeting and improving customer needs in supply chain management involves continuously evaluating customer expectations, implementing feedback loops, and applying continuous improvement methodologies to enhance service delivery, responsiveness, and overall customer experience.","b":"understand","df":"medium"},"G.11":{"t":"Describe how supply chain management meets and improves the logistic needs of different customer segments","d":"Supply chain segmentation is the practice of designing and operating distinct end-to-end value chains tailored to the unique logistics requirements, service expectations, and profitability profiles of different customer groups.","b":"understand","df":"medium"},"H.1":{"t":"Describe different types of supply chain management planning.","d":"Supply chain management planning encompasses three primary levels -- strategic, tactical, and operational -- each addressing different time horizons and decision scopes to align supply with demand.","b":"understand","df":"medium"},"H.2":{"t":"Define Static vs. Dynamic Planning.","d":"Static planning uses a fixed plan generated at a point in time that remains unchanged until the next planning cycle, while dynamic planning continuously updates the plan as master data changes such as new orders or demand shifts.","b":"remember","df":"easy"},"H.3":{"t":"Explain how a master production schedule is determined.","d":"A master production schedule (MPS) is a plan that specifies what products will be manufactured, in what quantities, and when, serving as the bridge between demand forecasts and detailed production planning.","b":"understand","df":"medium"},"H.4":{"t":"Define Bill of Material (BOM).","d":"A bill of materials (BOM) is a comprehensive, structured list of all raw materials, components, sub-assemblies, and the quantities of each needed to manufacture a finished product.","b":"remember","df":"easy"},"H.5":{"t":"Describe raw materials required for supply chain management.","d":"Raw materials are the unprocessed or minimally processed inputs -- such as steel, wood, plastics, and agricultural products -- that are used in the production of goods and represent the first link in the supply chain.","b":"understand","df":"medium"},"H.6":{"t":"Describe work-in-process for supply chain management.","d":"Work-in-process (WIP) refers to partially completed goods that are in various stages of the manufacturing process, having moved beyond raw materials but not yet completed as finished goods.","b":"understand","df":"medium"},"H.7":{"t":"Define finished goods and the goal to move those goods.","d":"Finished goods are products that have completed the entire manufacturing process, passed quality inspection, and are ready for sale and delivery to customers.","b":"remember","df":"easy"},"I.1":{"t":"Explain the importance of cooperation and coordination in a supply chain.","d":"Supply chain cooperation and coordination refer to the alignment and harmonization of activities, processes, and decision-making among all supply chain partners to optimize the flow of goods, services, and information from origin to end customer.","b":"understand","df":"medium"},"I.2":{"t":"Describe the role of outsourcing in a supply chain.","d":"Outsourcing in a supply chain is the practice of contracting specific business functions or processes to external third-party service providers, allowing the organization to focus on its core competencies while leveraging specialized expertise.","b":"understand","df":"medium"},"I.3":{"t":"Describe measurement of supply chain performance.","d":"Supply chain performance measurement is the use of standardized metrics and key performance indicators (KPIs) to quantify the efficiency, effectiveness, and responsiveness of supply chain operations across dimensions such as reliability, cost, speed, and asset utilization.","b":"understand","df":"medium"},"I.4":{"t":"Explain the role of the team in supply chain management.","d":"Cross-functional teams in supply chain management are groups composed of members from different functional areas such as procurement, logistics, production, sales, and finance who collaborate to align supply chain operations with organizational strategy.","b":"understand","df":"medium"},"I.5":{"t":"Describe the channels of distribution for supply chain management.","d":"Distribution channels are the networks of organizations and intermediaries through which products and services flow from the point of production to the final consumer, encompassing direct, indirect, and hybrid pathways.","b":"understand","df":"medium"},"J.1":{"t":"Describe the impact of information technology in supply chain management.","d":"Information technology in supply chain management refers to the use of computerized systems, software, and digital communication tools to plan, execute, monitor, and optimize the flow of materials, information, and funds across the entire supply chain network.","b":"understand","df":"medium"},"J.2":{"t":"Explain how E-business has impacted supply chain management.","d":"E-business is the integration of internet-based technologies and electronic platforms into all aspects of business operations, fundamentally transforming how supply chain partners communicate, transact, and collaborate across sourcing, procurement, manufacturing, and distribution.","b":"understand","df":"medium"},"J.3":{"t":"Describe the financial flow in supply chain management.","d":"Financial flow in supply chain management is the movement of money and financial transactions between supply chain partners, typically flowing upstream from customers to suppliers as payment for goods and services, and encompassing credit terms, payment schedules, consignment arrangements, and title ownership.","b":"understand","df":"medium"},"J.4":{"t":"Explain how e-commerce has impacted channels of distribution.","d":"E-commerce has fundamentally reshaped channels of distribution by enabling direct-to-consumer (DTC) sales models, disintermediating traditional wholesale and retail intermediaries, and driving the adoption of omnichannel fulfillment strategies that blend online and physical distribution networks.","b":"understand","df":"medium"},"J.5":{"t":"Describe political and economic events that impact supply chain management.","d":"Political and economic events are external forces such as geopolitical conflicts, trade wars, tariffs, sanctions, regulatory changes, currency fluctuations, and economic recessions that disrupt the sourcing, production, transportation, and distribution of goods across global supply chains.","b":"understand","df":"medium"},"J.6":{"t":"Explain how competition impact supply chain management decisions.","d":"Competition in supply chain management refers to the rivalry among firms and their respective supply chain networks that drives strategic decisions on cost reduction, speed, quality, flexibility, and innovation to achieve and sustain competitive advantage in the marketplace.","b":"understand","df":"medium"},"K.1":{"t":"Functions of distribution channels","d":"Distribution channels perform essential functions including sorting, storing, transporting, financing, risk-bearing, and negotiating to move products from manufacturers to consumers efficiently.","b":"remember","df":"easy"},"K.2":{"t":"Time, place, and ownership utility","d":"Time utility makes products available when customers need them, place utility makes products available where customers want them, and ownership (possession) utility facilitates the transfer of product ownership to the customer.","b":"understand","df":"medium"},"K.3":{"t":"Role of marketing channels for assembly, storage, sorting, and transportation","d":"Marketing channels perform logistical functions of assembling products from various sources, storing them until needed, sorting them into appropriate quantities and assortments, and transporting them from manufacturers to customers.","b":"understand","df":"medium"},"K.4":{"t":"Facilitation in supply chain management","d":"Facilitation in supply chain management refers to the supporting activities that enable the smooth flow of products through the channel, including financing, information sharing, grading, and coordination among channel members.","b":"remember","df":"easy"},"K.5":{"t":"Pre-sale and post-purchase services in distribution channels","d":"Distribution channels provide pre-sale services (product information, demonstrations, financing options) and post-purchase services (maintenance, returns, customer support, and channel coordination) to facilitate the complete customer experience.","b":"understand","df":"medium"},"K.6":{"t":"How supply chain management creates efficiencies","d":"Supply chain management creates efficiencies by reducing the number of transactions between producers and consumers, optimizing inventory levels, consolidating shipments, leveraging technology, and coordinating activities across all channel members.","b":"understand","df":"medium"},"K.7":{"t":"Risk sharing in supply chain management","d":"Risk sharing in supply chain management occurs when channel members purchase products in advance from manufacturers, thereby assuming financial risk for unsold inventory and sharing the burden of bringing products to market.","b":"understand","df":"medium"},"K.8":{"t":"Indirect channels of distribution","d":"Indirect channels of distribution involve the use of one or more intermediaries such as wholesalers, retailers, or agents between the manufacturer and the end consumer to sell and deliver products.","b":"remember","df":"easy"},"K.9":{"t":"Role of intermediaries in selling products","d":"Intermediaries are external organizations or individuals such as wholesalers, retailers, agents, and brokers that facilitate the sale and distribution of products between manufacturers and end consumers.","b":"remember","df":"easy"},"K.10":{"t":"One-level channel of distribution","d":"A one-level channel of distribution involves a single intermediary, typically a retailer, between the manufacturer and the end customer (manufacturer to retailer to customer).","b":"remember","df":"easy"},"K.11":{"t":"Two-level channel of distribution","d":"A two-level channel of distribution involves two intermediaries, a wholesaler and a retailer, between the manufacturer and the end customer (manufacturer to wholesaler to retailer to customer).","b":"remember","df":"easy"},"K.12":{"t":"Three-level channel of distribution","d":"A three-level channel of distribution involves three intermediaries between the manufacturer and the end customer: an agent or broker, a wholesaler, and a retailer (manufacturer to agent to wholesaler to retailer to customer).","b":"remember","df":"easy"},"K.13":{"t":"Dual distribution","d":"Dual distribution is a strategy where a manufacturer or wholesaler uses two or more channels simultaneously to reach end consumers, such as selling through both physical showrooms and internet platforms.","b":"understand","df":"medium"},"K.14":{"t":"How services use intermediaries to reach final customers","d":"Service industries use intermediaries such as agents, brokers, franchisees, and digital platforms to extend their reach and deliver services to end customers who may not be accessible through direct channels alone.","b":"understand","df":"medium"},"K.15":{"t":"On-demand business model","d":"The on-demand business model is a strategy where customer demand is fulfilled by delivering immediate goods or services through digital platforms such as mobile apps or websites, connecting providers with consumers in real time.","b":"remember","df":"easy"},"K.16":{"t":"How market, product, competition, and company factors impact distribution choice","d":"The choice of distribution channel is influenced by four key factor categories: market factors (size, geography, customer behavior), product factors (complexity, perishability, value), competitive factors (competitor channel strategies), and company factors (financial strength, resources, objectives).","b":"understand","df":"medium"},"K.17":{"t":"How product characteristics impact supply chain management","d":"Product characteristics including perishability, cost, and technicality directly impact supply chain management decisions regarding channel length, storage requirements, transportation methods, and handling procedures.","b":"understand","df":"medium"}},"l3":{"A.1":"A mid-sized electronics manufacturer is struggling because its procurement team negotiates contracts without consulting the production schedule, the warehouse s","A.2":"A frozen pizza company traces its product journey starting from wheat farms in Kansas, tomato growers in California, and dairy producers in Wisconsin. The ingre","A.3":"A regional hospital system needs to move surgical gloves, IV fluids, and pharmaceutical products from multiple vendors' warehouses to 12 hospital locations acro","A.4":"An online furniture retailer invested heavily in optimizing its delivery network by consolidating shipments, renegotiating carrier contracts, and opening two re","A.5":"A U.S.-based direct-to-consumer skincare brand sources organic shea butter from Ghana and glass bottles from Italy. After a new 25% duty is imposed on certain A","A.6":"A European clothing  that exceed what customers could achieve alone.","A.14":"External forces like regulation, technology, and market shifts altering how networks operate.","B.1":"Extracting predictions and patterns from operational data to guide better decisions.","B.2":"Systems tracking buyer interactions to improve retention and satisfaction over time.","B.3":"Predicting future demand to guide planning, purchasing, and production decisions.","B.4":"Expanding delivery networks across international borders to serve worldwide markets.","B.5":"Coordinating medical supplies, pharmaceuticals, and equipment from manufacturer to patient bedside.","B.6":"Balancing stock levels to meet demand without excess carrying costs or shortages.","B.7":"Acquiring goods and services from external suppliers at optimal quality, cost, and timing.","B.8":"Aligning production capacity with demand forecasts across functional teams monthly.","B.9":"Gathering and analyzing data about supplier capabilities, pricing trends, and market conditions.","B.10":"Minimizing environmental and social harm while maintaining operational performance and profitability.","B.11":"How routing and carrier decisions affect network cost, speed, and service reliability.","B.12":"Professional roles spanning procurement, logistics, planning, and operations across all industries.","C.1":"Guiding cross-functional teams through complex coordination challenges that span entire organizations.","C.2":"Clearly conveying plans, priorities, and changes across diverse internal and external stakeholders.","C.3":"Upholding honest, fair, and transparent practices throughout every stage of the network.","C.4":"Multilingual ability enabling effective negotiation and coordination with global partners.","C.5":"Adapting approaches quickly when disruptions invalidate existing plans and assumptions.","C.6":"Knowing specialized shipping vocabulary for accurate carrier communication and documentation.","C.7":"Resolving operational conflicts through interpersonal judgment and analytical reasoning together.","C.8":"Leveraging digital tools to automate, analyze, and optimize network operations effectively.","C.9":"Acting decisively under time pressure when delays cascade exponentially through the network.","C.10":"Using spreadsheet modeling for analysis, reporting, and quick decision support daily.","C.11":"Maintaining composure and persistence amid constant change and competing demands from all sides.","D.1":"How buying decisions connect to and shape the broader network's cost and performance.","D.2":"Aligning organizational capabilities with network-wide performance goals and partner expectations.","D.3":"Selecting and configuring external partners to build an effective operational network.","D.4":"Unifying processes, data, and decisions across partner organizations into one cohesive system.","D.5":"Balancing what is available with what customers want across multiple time horizons.","D.6":"Optimizing the number, size, and location of warehouses and plants to minimize total costs.","D.7":"Controlling costs across procurement, production, storage, and delivery without sacrificing performance.","E.1":"The transformation stage where components become sellable goods within a coordinated network.","E.2":"Balancing the cost of holding goods against the risk of running out.","E.3":"Choosing how, when, and by whom goods physically travel between origin and destination.","E.4":"Facilities that buffer timing gaps between when goods are made and when they are needed.","E.5":"The reverse flow that moves unwanted or defective items back upstream for resolution.","E.6":"The function ensuring buyers receive the right product, on time, with issues resolved quickly.","F.1":"Selecting which items to offer by weighing market appetite against profit potential.","F.2":"Analyzing buyer behavior and organizational strengths to shape the offering mix.","F.3":"The full collection of items a firm offers, spanning every category and variant.","F.4":"The recurring pattern where a small fraction of causes drives the vast majority of effects.","F.5":"Items whose sales velocity is declining as they approach end-of-life status.","F.6":"Keeping stock lean at every node to free capital and reduce waste.","G.1":"Coordinating the pace of goods so each stage receives inputs at precisely the right moment.","G.2":"Getting the greatest possible return from every unit of stock held across the network.","G.3":"Buffer positions that insulate one part of the network from volatility in another.","G.4":"Using mathematical formulas to decide where spending produces the highest network-wide benefit.","G.5":"Locating facilities nearer to buyers speeds delivery but multiplies infrastructure costs.","G.6":"Evaluating potential suppliers on price, quality, and dependability to decide who provides what.","G.7":"Measuring network performance against defined benchmarks to identify gaps and improvements.","G.8":"Configuring the entire network so end users get what they want, when and where they want it.","G.9":"External buying patterns that trigger upstream adjustments in production and distribution.","G.10":"Using performance feedback to continuously raise the bar on delivery and service quality.","G.11":"Offering distinct delivery speeds and service tiers based on each buyer group's priorities.","H.1":"Distinct planning layers that differ by time horizon, decision scope, and level of detail.","H.2":"Fixed one-time plans versus continuously revised plans that adapt to changing conditions.","H.3":"A time-phased plan stating exactly what to build, how many, and when.","H.4":"A structured recipe listing every part and quantity needed to assemble one unit.","H.5":"Unprocessed inputs that have not yet undergone any conversion or assembly step.","H.6":"Partially completed items sitting between the start and end of the conversion process.","H.7":"Completed products ready to ship, whose value is only realized once they reach the buyer.","I.1" ":"Tracking metrics like fill rate, cycle time, and cost to evaluate network effectiveness.","I.4":"Cross-functional groups collaborating to solve problems that span organizational boundaries.","I.5":"Pathways through which products travel from producer to final buyer.","J.1":"Digital systems automating visibility, communication, and decision-making across the network.","J.2":"Online platforms transforming ordering, fulfillment, and partner collaboration.","J.3":"Money moving between partners through payments, credit terms, and cost-sharing arrangements.","J.4":"Direct-to-consumer selling reshaping traditional intermediary-based delivery networks.","J.5":"Government policies, trade disputes, and economic shifts disrupting established network operations.","J.6":"Rival actions forcing faster, cheaper, or more innovative network responses.","K.1":"Activities like sorting, storing, and transporting that move products toward buyers.","K.2":"Making products available when, where, and in the form customers want them.","K.3":"Intermediary operations that aggregate, organize, and ship goods between producers and buyers.","K.4":"Support activities like financing, insurance, and market research enabling smooth transactions.","K.5":"Assistance provided before buying and after receiving to build customer confidence.","K.6":"Reducing redundant steps so fewer resources produce more output.","K.7":"Distributing potential losses across multiple partners rather than one bearing all exposure.","K.8":"Using one or more middlemen between the producer and the end customer.","K.9":"Middlemen connecting producers to markets they could not reach alone.","K.10":"A single intermediary — typically a retailer — between maker and buyer.","K.11":"Both a wholesaler and retailer standing between producer and consumer.","K.12":"An agent, wholesaler, and retailer all involved before the product reaches the buyer.","K.13":"Selling through both direct and intermediary channels simultaneously.","K.14":" <script>
// ── Data Loading ──
const DATA = JSON.parse(document.getElementById('embedded-data').textContent);

const SECTION_COLORS = {
  A:'#ef4444', B:'#f97316', C:'#f59e0b', D:'#84cc16',
  E:'#22c55e', F:'#14b8a6', G:'#06b6d4', H:'#3b82f6',
  I:'#8b5cf6', J:'#a855f7', K:'#ec4899'
};
const SECTION_TITLES = {
  A:'Essential SCM Concepts', B:'Supply Chain Topics', C:'Manager Characteristics',
  D:'Planning & Design', E:'SC Process', F:'Product Portfolio',
  G:'Network Performance', H:'Production Planning', I:'Coordination & Decisions',
  J:'Contemporary Issues', K:'Distribution Channels'
};
const EDGE_COLORS = {
  related_to:'#22c55e', includes:'#00b4d8', applies_to:'#a855f7',
  part_of:'#f59e0b', prerequisite_for:'#ef4444', contrasts_with:'#ec4899'
};
const LEVEL_NAMES = {
  L1:'Definition', L2:'Simplified', L3:'Scenario', L4:'Analogy',
  L5:'Connections', L6:'Systems', L7:'Tradeoffs', L8:'Micro-Def', L9:'Reverse'
};

// ── State ──
let selectedNode = null;
let cascadeMode = false;
let tradeoffMode = false;
let simulation, svg, linkGroup, nodeGroup, zoom;

// ── Build filters ──
const secSelect = document.getElementById('filterSection');
Object.keys(SECTION_TITLES).forEach(s => {
  const opt = document.createElement('option');
  opt.value = s;
  opt.textContent = s + ' — ' + SECTION_TITLES[s];
  secSelect.appendChild(opt);
});

// ── Build legends ──
(function buildLegend() {
  var secDiv = document.getElementById('legendSections');
  Object.entries(SECTION_COLORS).forEach(function(e) {
    var row = document.createElement('div');
    row.className = 'legend-row';
    var swatch = document.createElement('div');
    swatch.className = 'legend-swatch';
    swatch.style.background = e[1];
    var lbl = document.createElement('span');
    lbl.textContent = e[0] + ' ' + SECTION_TITLES[e[0]];
    row.appendChild(swatch);
    row.appendChild(lbl);
    secDiv.appendChild(row);
  });
  var edgeDiv = document.getElementById('legendEdges');
  Object.entries(EDGE_COLORS).forEach(function(e) {
    var row = document.createElement('div');
    row.className = 'legend-row';
    var line = document.createElement('div');
    line.className = 'legend-line';
    line.style.borderColor = e[1];
    var lbl = document.createElement('span');
    lbl.textContent = e[0].replace(/_/g,' ');
    row.appendChild(line);
    row.appendChild(lbl);
    edgeDiv.appendChild(row);
  });
})();

// ── Graph Setup ──
const container = document.getElementById('graph-container');
const width = container.clientWidth;
const height = container.clientHeight || 700;

svg = d3.select('#graph');
const defs = svg.append('defs');

// Arrow markers for each edge type
Object.entries(EDGE_COLORS).forEach(function(e) {
  defs.append('marker')
    .attr('id', 'arrow-' + e[0])
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 20).attr('refY', 0)
    .attr('markerWidth', 5).attr('markerHeight', 5)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-4L10,0L0,4')
    .attr('fill', e[1])
    .attr('opacity', 0.6);
});

const g = svg.append('g');
linkGroup = g.append('g').attr('class', 'links');
nodeGroup = g.append('g').attr('class', 'nodes');

zoom = d3.zoom()
  .scaleExtent([0.2, 8])
  .on('zoom', function(event) { g.attr('transform', event.transform); });
svg.call(zoom);

// ── Connection counts ──
const connCount = {};
DATA.links.forEach(function(l) {
  connCount[l.source] = (connCount[l.source]||0) + 1;
  connCount[l.target] = (connCount[l.target]||0) + 1;
});

// ── Simulation ──
const nodes = DATA.nodes.map(function(n) { return Object.assign({}, n); });
const links = DATA.links.map(function(l) { return Object.assign({}, l); });

simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(function(d){return d.id;}).distance(60).strength(0.3))
  .force('charge', d3.forceManyBody().strength(-120).distanceMax(300))
  .force('center', d3.forceCenter(width/2, height/2))
  .force('collision', d3.forceCollide().radius(function(d){return nodeRadius(d)+4;}))
  .force('x', d3.forceX(width/2).strength(0.03))
  .force('y', d3.forceY(height/2).strength(0.03));

// Section clustering force
var sectionCenters = {};
var secList = Object.keys(SECTION_COLORS);
secList.forEach(function(s, i) {
  var angle = (i / secList.length) * 2 * Math.PI - Math.PI/2;
  sectionCenters[s] = { x: width/2 + Math.cos(angle)*180, y: height/2 + Math.sin(angle)*180 };
});
simulation.force('cluster', function(alpha) {
  nodes.forEach(function(d) {
    var c = sectionCenters[d.section];
    if (c) {
      d.vx += (c.x - d.x) * alpha * 0.08;
      d.vy += (c.y - d.y) * alpha * 0.08;
    }
  });
});

function nodeRadius(d) {
  return Math.max(5, Math.min(16, 3 + (connCount[d.id]||0) * 0.7));
}

// ── Render ──
var linkElements = linkGroup.selectAll('line')
  .data(links).enter().append('line')
  .attr('class', 'link')
  .attr('stroke', function(d){return EDGE_COLORS[d.type]||'#444';})
  .attr('stroke-width', function(d){return d.type==='related_to'?1:1.5;})
  .attr('marker-end', function(d){return 'url(#arrow-'+d.type+')';});

var nodeElements = nodeGroup.selectAll('g')
  .data(nodes).enter().append('g')
  .attr('class', 'node')
  .call(d3.drag()
    .on('start', function(event,d){ if(!event.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag', function(event,d){ d.fx=event.x; d.fy=event.y; })
    .on('end', function(event,d){ if(!event.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; })
  );

nodeElements.append('circle')
  .attr('r', nodeRadius)
  .attr('fill', function(d){return SECTION_COLORS[d.section];})
  .attr('stroke', function(d){return SECTION_COLORS[d.section];})
  .attr('fill-opacity', 0.7)
  .attr('stroke-opacity', 0.9);

nodeElements.append('text')
  .attr('dx', function(d){return nodeRadius(d)+3;})
  .attr('dy', '0.35em')
  .text(function(d){
    var label = d.label || '';
    return label.length > 30 ? label.substring(0,28) + '..' : label;
  });

// ── Tick ──
simulation.on('tick', function() {
  linkElements
    .attr('x1',function(d){return d.source.x;}).attr('y1',function(d){return d.source.y;})
    .attr('x2',function(d){return d.target.x;}).attr('y2',function(d){return d.target.y;});
  nodeElements.attr('transform', function(d){return 'translate('+d.x+','+d.y+')';});
});

// ── Click: Inspector ──
nodeElements.on('click', function(event, d) {
  event.stopPropagation();
  if (cascadeMode) { triggerCascade(d); return; }
  selectNode(d);
});

// ── Double-click: Drill-down ──
nodeElements.on('dblclick', function(event, d) {
  event.stopPropagation();
  event.preventDefault();
  openDrilldown(d);
});

svg.on('click', function() {
  if (selectedNode) deselectAll();
});

// ── Select Node (Inspector) ──
function selectNode(d) {
  selectedNode = d;
  var connected = new Set();
  links.forEach(function(l) {
    var sid = typeof l.source === 'object' ? l.source.id : l.source;
    var tid = typeof l.target === 'object' ? l.target.id : l.target;
    if (sid === d.id) connected.add(tid);
    if (tid === d.id) connected.add(sid);
  });
  connected.add(d.id);

  nodeElements.classed('selected', function(n){return n.id===d.id;});
  nodeElements.classed('dimmed', function(n){return !connected.has(n.id);});
  linkElements.classed('dimmed', function(l){
    var sid = typeof l.source === 'object' ? l.source.id : l.source;
    var tid = typeof l.target === 'object' ? l.target.id : l.target;
    return sid !== d.id && tid !== d.id;
  });
  linkElements.classed('highlighted', function(l){
    var sid = typeof l.source === 'object' ? l.source.id : l.source;
    var tid = typeof l.target === 'object' ? l.target.id : l.target;
    return sid === d.id || tid === d.id;
  });

  buildPanel(d, connected);
}

function deselectAll() {
  selectedNode = null;
  nodeElements.classed('selected', false).classed('dimmed', false);
  linkElements.classed('dimmed', false).classed('highlighted', false);
}

// ── Build Panel ──
function buildPanel(d, connected) {
  var concept = DATA.concepts[d.id];
  if (!concept) return;

  document.getElementById('panelTitle').textContent = concept.t;
  var meta = document.getElementById('panelMeta');
  while (meta.firstChild) meta.removeChild(meta.firstChild);
  var items = [
    { html: d.id, prefix: '' },
    { html: d.section, prefix: '', swatch: true },
    { html: concept.b, prefix: 'Bloom: ' },
    { html: concept.df, prefix: 'Diff: ' },
    { html: String(connCount[d.id]||0) + ' connections', prefix: '' }
  ];
  items.forEach(function(item) {
    var span = document.createElement('span');
    if (item.swatch) {
      var sw = document.createElement('span');
      sw.className = 'section-badge';
      sw.style.background = SECTION_COLORS[d.section];
      span.appendChild(sw);
    }
    span.appendChild(document.createTextNode(item.prefix + item.html));
    meta.appendChild(span);
  });

  var body = document.getElementById('panelBody');
  while (body.firstChild) body.removeChild(body.firstChild);

  // L1 Definition
  addLevelRing(body, 'L1', 'Definition', [{q:'Definition', a:concept.d}], true);

  // L3 Scenario
  if (DATA.l3[d.id]) {
    addLevelRing(body, 'L3', 'Scenario', [{q:'Scenario', a:DATA.l3[d.id]}]);
  }
  // L4 Analogy
  if (DATA.l4[d.id]) {
    addLevelRing(body, 'L4', 'Analogy & Example', [
      {q:'Analogy', a:DATA.l4[d.id].a},
      {q:'Concrete Example', a:DATA.l4[d.id].e}
    ]);
  }

  // L5 Relationships for this node
  var nodeL5 = DATA.l5.filter(function(r){return r.s===d.id||r.t===d.id;});
  if (nodeL5.length > 0) {
    var l5items = nodeL5.map(function(r){
      var dir = r.s===d.id ? r.s+' \u2192 '+r.t : r.t+' \u2190 '+r.s;
      return {q:r.tp.replace(/_/g,' ')+' ('+dir+')', a:r.d};
    });
    addLevelRing(body, 'L5', 'Connections (' + nodeL5.length + ')', l5items);
  }

  // L6 Chains involving this node
  var nodeL6 = DATA.l6c.filter(function(c){return c.ch.indexOf(d.id)>=0;});
  if (nodeL6.length > 0) {
    var l6items = nodeL6.map(function(c){
      return {q:'Chain: '+c.ch.join(' \u2192 ')+' | Disrupted: '+c.dis, a:c.con};
    });
    addLevelRing(body, 'L6', 'Consequence Chains (' + nodeL6.length + ')', l6items);
  }

  // L6 Bridges
  var nodeL6b = DATA.l6b.filter(function(b){return b.s===d.id||b.t===d.id;});
  if (nodeL6b.length > 0) {
    var l6bitems = nodeL6b.map(function(b){
      return {q:'Bridge: '+b.s+' \u2194 '+b.t, a:b.d};
    });
    addLevelRing(body, 'L6b', 'Cross-Section Bridges (' + nodeL6b.length + ')', l6bitems);
  }

  // L7 Tradeoffs
  var nodeL7 = DATA.l7.filter(function(t){return t.a.c===d.id||t.b.c===d.id;});
  if (nodeL7.length > 0) {
    var sec = document.createElement('div');
    sec.className = 'connections-section';
    var h3 = document.createElement('h3');
    h3.textContent = 'L7 \u2014 Strategic Tradeoffs (' + nodeL7.length + ')';
    sec.appendChild(h3);
    nodeL7.forEach(function(t) {
      var card = document.createElement('div');
      card.className = 'tradeoff-card';
      var scen = document.createElement('div');
      scen.className = 'scenario';
      scen.textContent = t.sc;
      card.appendChild(scen);
      var objs = document.createElement('div');
      objs.className = 'objectives';
      var objA = document.createElement('div');
      objA.className = 'obj obj-a';
      objA.textContent = t.a.l;
      var objB = document.createElement('div');
      objB.className = 'obj obj-b';
      objB.textContent = t.b.l;
      objs.appendChild(objA);
      objs.appendChild(objB);
      card.appendChild(objs);
      var stl = document.createElement('div');
      stl.className = 'strat-label';
      stl.textContent = 'CORRECT STRATEGY';
      card.appendChild(stl);
      var strat = document.createElement('div');
      strat.className = 'strategy';
      strat.textContent = t.st;
      card.appendChild(strat);
      var sal = document.createElement('div');
      sal.className = 'strat-label';
      sal.textContent = 'SACRIFICE';
      card.appendChild(sal);
      var sac = document.createElement('div');
      sac.className = 'sacrifice';
      sac.textContent = t.sa;
      card.appendChild(sac);
      sec.appendChild(card);
    });
    body.appendChild(sec);
  }

  // L8 Micro
  if (DATA.l8[d.id]) {
    addLevelRing(body, 'L8', 'Micro-Definition', [{q:'Compressed', a:DATA.l8[d.id]}]);
  }
  // L9 Reverse
  if (DATA.l9[d.id]) {
    addLevelRing(body, 'L9', 'Reverse Match', [{q:'Short Definition', a:DATA.l9[d.id]}]);
  }

  // Connections list
  var connSec = document.createElement('div');
  connSec.className = 'connections-section';
  var h3c = document.createElement('h3');
  h3c.textContent = 'Direct Connections (' + (connected.size-1) + ')';
  connSec.appendChild(h3c);

  links.forEach(function(l) {
    var sid = typeof l.source === 'object' ? l.source.id : l.source;
    var tid = typeof l.target === 'object' ? l.target.id : l.target;
    if (sid !== d.id && tid !== d.id) return;
    var otherId = sid === d.id ? tid : sid;
    var otherConcept = DATA.concepts[otherId];
    if (!otherConcept) return;
    var item = document.createElement('div');
    item.className = 'conn-item';
    var typeSpan = document.createElement('span');
    typeSpan.className = 'conn-type type-' + l.type;
    typeSpan.textContent = l.type.replace(/_/g,' ');
    item.appendChild(typeSpan);
    var arrow = sid===d.id ? ' \u2192 ' : ' \u2190 ';
    item.appendChild(document.createTextNode(otherId + arrow + otherConcept.t.substring(0,40)));
    item.addEventListener('click', function() {
      var target = nodes.find(function(n){return n.id===otherId;});
      if (target) selectNode(target);
    });
    connSec.appendChild(item);
  });
  body.appendChild(connSec);
}

function addLevelRing(parent, level, title, items, openByDefault) {
  var ring = document.createElement('div');
  ring.className = 'level-ring';
  var header = document.createElement('div');
  header.className = 'level-ring-header';
  var lbl = document.createElement('span');
  lbl.className = 'lbl';
  lbl.textContent = level + ' \u2014 ' + title;
  var cnt = document.createElement('span');
  cnt.className = 'cnt';
  cnt.textContent = items.length + (items.length===1?' entry':' entries');
  header.appendChild(lbl);
  header.appendChild(cnt);
  var body = document.createElement('div');
  body.className = 'level-ring-body' + (openByDefault ? ' open' : '');
  items.forEach(function(item) {
    var qa = document.createElement('div');
    qa.className = 'qa';
    var ql = document.createElement('div');
    ql.className = 'q-label';
    ql.textContent = item.q;
    var al = document.createElement('div');
    al.className = 'answer';
    al.textContent = item.a;
    qa.appendChild(ql);
    qa.appendChild(al);
    body.appendChild(qa);
  });
  header.addEventListener('click', function() { body.classList.toggle('open'); });
  ring.appendChild(header);
  ring.appendChild(body);
  parent.appendChild(ring);
}

// ── Filters ──
document.getElementById('filterSection').addEventListener('change', applyFilters);
document.getElementById('filterEdge').addEventListener('change', applyFilters);
document.getElementById('filterBloom').addEventListener('change', applyFilters);

function applyFilters() {
  var sec = document.getElementById('filterSection').value;
  var edge = document.getElementById('filterEdge').value;
  var bloom = document.getElementById('filterBloom').value;

  var visibleNodes = new Set();
  nodeElements.each(function(d) {
    var visible = true;
    if (sec !== 'all' && d.section !== sec) visible = false;
    if (bloom !== 'all' && d.bloom_level !== bloom) visible = false;
    d3.select(this).style('display', visible ? null : 'none');
    if (visible) visibleNodes.add(d.id);
  });

  linkElements.each(function(l) {
    var sid = typeof l.source === 'object' ? l.source.id : l.source;
    var tid = typeof l.target === 'object' ? l.target.id : l.target;
    var visible = visibleNodes.has(sid) && visibleNodes.has(tid);
    if (edge !== 'all' && l.type !== edge) visible = false;
    d3.select(this).style('display', visible ? null : 'none');
  });

  document.getElementById('kpiNodes').textContent = visibleNodes.size + ' nodes';
  var visEdges = 0;
  linkElements.each(function() { if (d3.select(this).style('display') !== 'none') visEdges++; });
  document.getElementById('kpiEdges').textContent = visEdges + ' edges';
}

// ── Cascade Mode ──
document.getElementById('btnCascade').addEventListener('click', function() {
  cascadeMode = !cascadeMode;
  this.classList.toggle('active');
  document.getElementById('cascadeIndicator').style.display = cascadeMode ? 'block' : 'none';
  if (!cascadeMode) deselectAll();
});

function triggerCascade(d) {
  // Find all L6 chains involving this node
  var chains = DATA.l6c.filter(function(c){ return c.ch.indexOf(d.id)>=0; });
  if (chains.length === 0) return;

  deselectAll();
  selectNode(d);

  // Collect all nodes in chains
  var cascadeNodes = new Set();
  var cascadeSequences = [];
  chains.forEach(function(c) {
    var startIdx = c.ch.indexOf(d.id);
    for (var i = startIdx; i < c.ch.length; i++) {
      cascadeNodes.add(c.ch[i]);
    }
    cascadeSequences.push(c.ch.slice(startIdx));
  });

  // Animate pulse along chains
  cascadeSequences.forEach(function(seq, si) {
    seq.forEach(function(nid, ni) {
      setTimeout(function() {
        var node = nodes.find(function(n){return n.id===nid;});
        if (!node) return;
        g.append('circle')
          .attr('class', 'cascade-pulse')
          .attr('cx', node.x).attr('cy', node.y)
          .attr('r', nodeRadius(node))
          .transition().duration(800)
          .attr('r', nodeRadius(node) + 25)
          .style('opacity', 0.7)
          .transition().duration(400)
          .style('opacity', 0)
          .remove();
      }, ni * 500 + si * 200);
    });
  });
}

// ── Tradeoff Mode ──
document.getElementById('btnTradeoffs').addEventListener('click', function() {
  tradeoffMode = !tradeoffMode;
  this.classList.toggle('active');
  if (tradeoffMode) showTradeoffEdges();
  else hideTradeoffEdges();
});

function showTradeoffEdges() {
  DATA.l7.forEach(function(t) {
    var srcNode = nodes.find(function(n){return n.id===t.a.c;});
    var tgtNode = nodes.find(function(n){return n.id===t.b.c;});
    if (!srcNode || !tgtNode) return;
    g.append('line')
      .attr('class', 'tradeoff-edge')
      .attr('x1', srcNode.x).attr('y1', srcNode.y)
      .attr('x2', tgtNode.x).attr('y2', tgtNode.y)
      .attr('stroke', '#ef4444')
      .attr('stroke-width', 2)
      .attr('stroke-dasharray', '6,4')
      .attr('stroke-opacity', 0.6);
  });
  // Update on tick
  simulation.on('tick.tradeoffs', function() {
    g.selectAll('.tradeoff-edge').each(function(_, i) {
      var t = DATA.l7[i];
      if (!t) return;
      var src = nodes.find(function(n){return n.id===t.a.c;});
      var tgt = nodes.find(function(n){return n.id===t.b.c;});
      if (src && tgt) {
        d3.select(this).attr('x1',src.x).attr('y1',src.y).attr('x2',tgt.x).attr('y2',tgt.y);
      }
    });
  });
}

function hideTradeoffEdges() {
  g.selectAll('.tradeoff-edge').remove();
  simulation.on('tick.tradeoffs', null);
}

// ── Reset ──
document.getElementById('btnReset').addEventListener('click', function() {
  deselectAll();
  cascadeMode = false;
  tradeoffMode = false;
  document.getElementById('btnCascade').classList.remove('active');
  document.getElementById('btnTradeoffs').classList.remove('active');
  document.getElementById('cascadeIndicator').style.display = 'none';
  hideTradeoffEdges();
  document.getElementById('filterSection').value = 'all';
  document.getElementById('filterEdge').value = 'all';
  document.getElementById('filterBloom').value = 'all';
  applyFilters();
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
});

// ── Panel toggle ──
function togglePanel() {
  document.getElementById('panel').classList.toggle('collapsed');
}

// ── Drill-down (double-click) ──
function openDrilldown(d) {
  var overlay = document.getElementById('drilldown');
  overlay.classList.add('active');

  var concept = DATA.concepts[d.id];
  if (!concept) return;

  var radSvg = d3.select('#radial');
  radSvg.selectAll('*').remove();

  var w = overlay.clientWidth;
  var h = overlay.clientHeight;
  radSvg.attr('width', w).attr('height', h);
  var cx = w/2, cy = h/2;

  // Center node
  radSvg.append('circle')
    .attr('cx', cx).attr('cy', cy).attr('r', 30)
    .attr('fill', SECTION_COLORS[d.section]).attr('fill-opacity', 0.8)
    .attr('stroke', '#fff').attr('stroke-width', 2);
  radSvg.append('text')
    .attr('x', cx).attr('y', cy).attr('text-anchor', 'middle').attr('dy', '0.35em')
    .attr('fill', '#fff').attr('font-size', '11px').attr('font-weight', '700')
    .text(d.id);
  radSvg.append('text')
    .attr('x', cx).attr('y', cy+45).attr('text-anchor', 'middle')
    .attr('fill', 'var(--text)').attr('font-size', '13px').attr('font-weight', '600')
    .text(concept.t.length > 60 ? concept.t.substring(0,58)+'..' : concept.t);

  // Level rings
  var levelData = [];
  var levelKeys = ['L1','L3','L4','L5','L6','L7','L8','L9'];
  levelKeys.forEach(function(lk) {
    var content = '';
    if (lk==='L1') content = concept.d ? concept.d.substring(0,100) : '';
    else if (lk==='L3') content = DATA.l3[d.id] ? DATA.l3[d.id].substring(0,100) : '';
    else if (lk==='L4') content = DATA.l4[d.id] ? DATA.l4[d.id].a.substring(0,100) : '';
    else if (lk==='L5') { var c = DATA.l5.filter(function(r){return r.s===d.id||r.t===d.id;}); content = c.length + ' connections'; }
    else if (lk==='L6') { var c = DATA.l6c.filter(function(ch){return ch.ch.indexOf(d.id)>=0;}); content = c.length + ' chains'; }
    else if (lk==='L7') { var c = DATA.l7.filter(function(t){return t.a.c===d.id||t.b.c===d.id;}); content = c.length + ' tradeoffs'; }
    else if (lk==='L8') content = DATA.l8[d.id] ? DATA.l8[d.id].substring(0,100) : '';
    else if (lk==='L9') content = DATA.l9[d.id] ? DATA.l9[d.id].substring(0,100) : '';
    if (content) levelData.push({level:lk, content:content});
  });

  var ringRadius = Math.min(w,h) * 0.32;
  levelData.forEach(function(ld, i) {
    var angle = (i / levelData.length) * 2 * Math.PI - Math.PI/2;
    var x = cx + Math.cos(angle) * ringRadius;
    var y = cy + Math.sin(angle) * ringRadius;

    // Connecting line
    radSvg.append('line')
      .attr('x1', cx).attr('y1', cy).attr('x2', x).attr('y2', y)
      .attr('stroke', 'var(--border)').attr('stroke-width', 1).attr('stroke-dasharray', '3,3');

    // Level node
    radSvg.append('circle')
      .attr('cx', x).attr('cy', y).attr('r', 22)
      .attr('fill', 'var(--surface2)').attr('stroke', SECTION_COLORS[d.section]).attr('stroke-width', 1.5);
    radSvg.append('text')
      .attr('x', x).attr('y', y-5).attr('text-anchor', 'middle')
      .attr('fill', SECTION_COLORS[d.section]).attr('font-size', '10px').attr('font-weight', '700')
      .text(ld.level);
    radSvg.append('text')
      .attr('x', x).attr('y', y+7).attr('text-anchor', 'middle')
      .attr('fill', 'var(--dim)').attr('font-size', '7px')
      .text(LEVEL_NAMES[ld.level]||'');

    // Content text (wrapped)
    var textX = x + (Math.cos(angle) > 0 ? 30 : -30);
    var anchor = Math.cos(angle) > 0 ? 'start' : 'end';
    radSvg.append('text')
      .attr('x', textX).attr('y', y)
      .attr('text-anchor', anchor).attr('dy', '0.35em')
      .attr('fill', 'var(--text)').attr('font-size', '9px')
      .text(ld.content.length > 60 ? ld.content.substring(0,58)+'..' : ld.content);
  });
}

document.getElementById('drilldown-close').addEventListener('click', closeDrilldown);
document.addEventListener('keydown', function(e) { if (e.key==='Escape') closeDrilldown(); });

function closeDrilldown() {
  document.getElementById('drilldown').classList.remove('active');
}

// ── Initial center ──
setTimeout(function() {
  svg.call(zoom.transform, d3.zoomIdentity.translate(0, 0).scale(0.85));
}, 100);
</script>
